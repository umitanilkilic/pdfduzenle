services:
  stirling-pdf:
    build:
      context: ../..
      dockerfile: docker/embedded/Dockerfile
    container_name: stirling-pdf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP'"]
      interval: 5s
      timeout: 10s
      retries: 16
    ports:
      - "8080:8080"
    volumes:
      - ../../stirling/latest/data:/usr/share/tessdata:rw
      - ../../stirling/latest/config:/configs:rw
      - ../../stirling/latest/logs:/logs:rw
    env_file:
      - DISABLE_ADDITIONAL_FEATURES=true
      - SECURITY_ENABLELOGIN=false
      - SYSTEM_DEFAULTLOCALE=tr-TR
      - UI_APPNAME="PDF Düzenle"
      - UI_HOMEDESCRIPTION="Türkçe PDF düzenleme platformu"
      - UI_APPNAMENAVBAR="PDF Düzenle"
      - UI_DEFAULT_HIDE_UNAVAILABLE_TOOLS=true
      - SYSTEM_MAXFILESIZE=100
      - METRICS_ENABLED=true
      - SYSTEM_GOOGLEVISIBILITY=true
      - SHOW_SURVEY=false
      - SYSTEM_SHOWSETTINGSWHENNOLOGIN=false
      - ENDPOINTS_TOREMOVE=ocr-pdf
      - ENDPOINTS_GROUPSTOREMOVE=Automation

    networks:
      - stirling-network

networks:
  stirling-network:
    driver: bridge

volumes:
  stirling-data:
  stirling-config:
  stirling-logs:
